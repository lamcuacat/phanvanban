<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trợ lý số phân luồng văn bản (KBNN DocuRoute AI)</title>
    <meta charset="UTF-8">
    <!-- Cấu hình chuẩn cho ứng dụng trên mobile và desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <link rel="icon" href="logo.png" type="image/png">
    
    <style>
        /* Reset hoàn toàn body và html */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #F8FAFC; /* Màu nền tệp với App bên trong */
            /* Chống hiện tượng kéo nảy trên iOS (Overscroll) */
            overscroll-behavior: none;
        }

        /* Khung iFrame bọc ứng dụng Apps Script */
        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            width: 100vw; 
            height: 100vh; 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>
